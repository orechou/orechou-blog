name: deploy

on:
  push:
  workflow_dispatch:
  schedule:
    # Runs everyday at 8:00 AM
    - cron: "0 0 * * *"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: "latest"

      - name: Build Web
        run: hugo

      - name: Recreate CNAME
        run: echo 'www.orechou.com' > public/CNAME  # 使用你的自定义域名

      - name: Deploy Web
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          EXTERNAL_REPOSITORY: OreChou/orechou.github.io
          PUBLISH_BRANCH: master
          PUBLISH_DIR: ./public
          # commit_message: publish blog content
          commit_message: ${{ github.event.head_commit.message }}
